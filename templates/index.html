<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人工知能判別ゲーム</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1a1d28;
      --accent: #6c8cff;
      --you: #2a3550;
      --them: #2d2a3a;
      --text: #e6e8ef;
      --muted: #8b90a3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center;
    }
    .app { width: 100%; max-width: 600px; min-height: 100vh; padding: 16px;
      display: flex; flex-direction: column; }
    header { text-align: center; padding: 12px 0; }
    header h1 { font-size: 18px; margin: 0; }
    header p { font-size: 13px; color: var(--muted); margin: 6px 0 0; }
    .turn-info { font-size: 12px; color: var(--muted); text-align: center; margin: 8px 0; }
    .chat {
      flex: 1; background: var(--panel); border-radius: 12px;
      padding: 12px; overflow-y: auto; min-height: 300px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
    .msg.you { align-self: flex-end; background: var(--you); }
    .msg.them { align-self: flex-start; background: var(--them); }
    .msg .label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .wait-note { font-size: 12px; color: var(--muted); text-align: center; padding: 4px 0; }
    .input-row { display: flex; gap: 8px; margin-top: 12px; }
    input[type=text] {
      flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333;
      background: #11141d; color: var(--text); font-size: 14px;
    }
    button {
      padding: 12px 16px; border: none; border-radius: 10px;
      background: var(--accent); color: white; font-size: 14px; cursor: pointer;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .judge-box { margin-top: 12px; text-align: center; }
    .judge-box .q { font-size: 14px; margin-bottom: 10px; }
    .judge-buttons { display: flex; gap: 10px; justify-content: center; }
    .judge-buttons button { flex: 1; max-width: 180px; }
    .result { margin-top: 16px; padding: 16px; border-radius: 12px;
      background: var(--panel); text-align: center; font-size: 15px; }
    .result.correct { border: 2px solid #4caf50; }
    .result.wrong { border: 2px solid #e05656; }
    .result.neutral { border: 2px solid #555; }
    .hidden { display: none; }
    .restart { margin-top: 12px; background: #444; }

    /* 選択画面 */
    .select-screen { display: flex; flex-direction: column; gap: 24px; padding: 24px 0; }
    .select-block { display: flex; flex-direction: column; gap: 12px; }
    .select-label { font-size: 14px; color: var(--muted); }
    .mode-buttons { display: flex; gap: 12px; }
    .mode-btn {
      flex: 1; display: flex; flex-direction: column; gap: 4px; align-items: center;
      background: var(--panel); border: 2px solid #2a2e3c; color: var(--text);
      padding: 20px 12px; border-radius: 12px; font-size: 15px; cursor: pointer;
    }
    .mode-btn.sel { border-color: var(--accent); background: #1d2235; }
    .mode-sub { font-size: 11px; color: var(--muted); font-weight: normal; }
    .prep-note { font-size: 13px; color: #e0a85a; min-height: 18px; }
    .start-btn {
      background: var(--accent); padding: 16px; border-radius: 12px;
      font-size: 16px; font-weight: 500;
    }

    .survey { margin-top: 16px; padding: 16px; border-radius: 12px; background: var(--panel); }
    .survey-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; }
    .survey-label { display: block; font-size: 13px; color: var(--muted); margin: 14px 0 6px; }
    .confidence-row, .basis-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .confidence-row button, .basis-row button {
      background: #11141d; border: 1px solid #333; color: var(--text);
      padding: 8px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
    }
    .confidence-row button.sel, .basis-row button.sel {
      background: var(--accent); border-color: var(--accent);
    }
    .confidence-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
    textarea {
      width: 100%; margin-top: 4px; padding: 10px; border-radius: 8px;
      border: 1px solid #333; background: #11141d; color: var(--text);
      font-size: 13px; font-family: inherit; resize: vertical;
    }
    .survey-actions { display: flex; gap: 10px; margin-top: 16px; }
    .survey-actions button { flex: 1; }
    .skip-btn { background: #444; }
    .submit-btn { background: var(--accent); }

    /* 画面切り替え */
    .screen { flex: 1; display: flex; flex-direction: column; }
    .screen.hidden { display: none; }
    .menu-screen { justify-content: center; gap: 20px; padding: 24px 0; }
    .menu-hero { text-align: center; margin-bottom: 8px; }
    .menu-title { font-size: 22px; font-weight: 600; }
    .menu-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .menu-actions { display: flex; flex-direction: column; gap: 12px; }
    .menu-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .ghost-btn { background: transparent; border: 1px solid #333; color: var(--muted); }

    .field-label { font-size: 13px; color: var(--muted); margin: 6px 0; }
    .text-field {
      padding: 12px; border-radius: 10px; border: 1px solid #333;
      background: #11141d; color: var(--text); font-size: 14px;
    }
    .num-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .num-btn {
      flex: 1; min-width: 48px; background: #11141d; border: 1px solid #333;
      color: var(--text); padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer;
    }
    .num-btn.sel { background: var(--accent); border-color: var(--accent); }
    .room-summary { font-size: 12px; color: var(--muted); padding: 8px 0; }

    .spinner {
      width: 36px; height: 36px; margin: 0 auto 16px;
      border: 3px solid #2a2e3c; border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .prep-text { text-align: center; font-size: 14px; color: var(--muted); }
    .role-banner {
      margin: 8px 0; padding: 10px 12px; border-radius: 10px;
      background: #23283a; border: 1px solid #3a4160;
      font-size: 13px; line-height: 1.6;
    }
    .judge-panel { margin-top: 12px; }
    .judge-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid #2a2e3c;
    }
    .judge-row .alias { flex: 1; font-size: 14px; }
    .judge-row button {
      padding: 8px 14px; font-size: 13px;
      background: #11141d; border: 1px solid #333; color: var(--text);
    }
    .judge-row button.sel-h { background: #2e7d32; border-color: #2e7d32; }
    .judge-row button.sel-a { background: #c62828; border-color: #c62828; }
    .reveal-list { text-align: left; font-size: 13px; margin-top: 10px; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>人工知能判別ゲーム</h1>
      <p id="headerHint">相手はAIのことも、人間のこともあります。</p>
    </header>

    <!-- タイトル画面 -->
    <div class="screen menu-screen" id="titleScreen">
      <div class="menu-hero">
        <div class="menu-title">人工知能判別ゲーム</div>
        <div class="menu-sub">相手が人間かAIかを見抜こう</div>
      </div>
      <div class="menu-actions">
        <button class="start-btn" onclick="showScreen('modeScreen')">ゲーム開始</button>
        <button class="ghost-btn" onclick="quitGame()">終了</button>
      </div>
    </div>

    <!-- モード選択 -->
    <div class="screen menu-screen hidden" id="modeScreen">
      <div class="select-label">対戦の種類を選んでください</div>
      <div class="mode-buttons">
        <button class="mode-btn" onclick="chooseEntry('single')">
          シングル<span class="mode-sub">相手1体と1対1</span>
        </button>
        <button class="mode-btn" onclick="chooseEntry('group')">
          オンライン<span class="mode-sub">クイックマッチ</span>
        </button>
      </div>
      <button class="ghost-btn" onclick="showScreen('titleScreen')">戻る</button>
    </div>

    <!-- シングル -->
    <div class="screen menu-screen hidden" id="singleScreen">
      <div class="select-label">シングル対戦</div>
      <p class="menu-desc">あなたが質問者になり、相手に質問して人間かAIかを当てます。</p>
      <div class="menu-actions">
        <button class="start-btn" onclick="startSinglePrep()">Start</button>
        <button class="ghost-btn" onclick="showScreen('modeScreen')">戻る</button>
      </div>
    </div>

    <!-- 準備中(マッチング/AI準備) -->
    <div class="screen menu-screen hidden" id="prepScreen">
      <div class="spinner"></div>
      <div class="prep-text" id="prepText">対戦相手を準備しています…</div>
      <button class="start-btn hidden" id="groupStartBtn" onclick="hostStartGroup()">この人数で開始する</button>
      <button class="ghost-btn" onclick="cancelMatching()">キャンセル</button>
    </div>

    <!-- ルーム作成 (グループ) -->
    <div class="screen menu-screen hidden" id="roomCreateScreen">
      <div class="select-label">オンライン対戦</div>
      <div class="mode-buttons">
        <button class="mode-btn" onclick="chooseVisibility('public')">
          クイックマッチ<span class="mode-sub">すぐに対戦相手を探す</span>
        </button>
        <button class="mode-btn" onclick="chooseVisibility('private')">
          プライベート<span class="mode-sub">合言葉で友達と対戦</span>
        </button>
      </div>
      <button class="ghost-btn" onclick="showScreen('modeScreen')">戻る</button>
    </div>

    <!-- プライベート設定: 合言葉 + モード -->
    <div class="screen menu-screen hidden" id="privateScreen">
      <div class="select-label">プライベートルーム（1対1）</div>
      <label class="field-label">合言葉（ルームの鍵）</label>
      <input type="text" id="roomKeyInput" class="text-field" placeholder="例: neko123" autocomplete="off">

      <label class="field-label">対戦モード（部屋を作る人が選ぶ）</label>
      <div class="mode-buttons">
        <button class="mode-btn sel" id="pmHuman" onclick="choosePrivateMode('human')">
          人間同士<span class="mode-sub">1対1</span>
        </button>
        <button class="mode-btn" id="pmShuffle" onclick="choosePrivateMode('shuffle')">
          シャッフル<span class="mode-sub">友達かAIか</span>
        </button>
        <button class="mode-btn" id="pmGroup" onclick="choosePrivateMode('group')">
          グループ<span class="mode-sub">みんなでAI探し</span>
        </button>
      </div>

      <!-- グループ設定 (グループ選択時のみ表示) -->
      <div id="groupConfig" class="hidden">
        <label class="field-label">人間の人数（あなたを含む）</label>
        <div class="num-row" id="gHumansRow">
          <button class="num-btn sel" data-n="2">2</button>
          <button class="num-btn" data-n="3">3</button>
          <button class="num-btn" data-n="4">4</button>
          <button class="num-btn" data-n="5">5</button>
          <button class="num-btn" data-n="6">6</button>
        </div>
        <label class="field-label">AIの数</label>
        <div class="num-row" id="gAiRow">
          <button class="num-btn" data-n="0">0</button>
          <button class="num-btn sel" data-n="1">1</button>
          <button class="num-btn" data-n="2">2</button>
          <button class="num-btn" data-n="3">3</button>
        </div>
        <label class="field-label">AIのふりをする人間の数</label>
        <div class="num-row" id="gHaaRow">
          <button class="num-btn sel" data-n="0">0</button>
          <button class="num-btn" data-n="1">1</button>
          <button class="num-btn" data-n="2">2</button>
        </div>
        <label class="field-label">配役モード（全員が役になりきる・遊び用）</label>
        <div class="num-row" id="gRpRow">
          <button class="num-btn sel" data-n="0">なし</button>
          <button class="num-btn" data-n="1">あり</button>
        </div>
      </div>
      <div class="prep-note" id="privateNote"></div>

      <div class="menu-actions">
        <button class="start-btn" onclick="createPrivate()">部屋を作る（ホスト）</button>
        <button class="start-btn" style="background:#3d4663" onclick="joinPrivate()">部屋に入る（ゲスト）</button>
        <button class="ghost-btn" onclick="showScreen('roomCreateScreen')">戻る</button>
      </div>
      <div class="prep-note">※ 3人以上のグループ戦は次フェーズで実装予定。</div>
    </div>

    <!-- ゲーム本体(準備完了後に表示) -->
    <div id="gameArea" class="screen hidden">
    <div class="turn-info" id="turnInfo"></div>
    <div class="role-banner hidden" id="roleBanner"></div>

    <div class="chat" id="chat"></div>
    <div class="wait-note hidden" id="waitNote">相手の返事を待っています…</div>

    <!-- 入力 (質問者: 質問 / 回答者: 回答) -->
    <div class="input-row" id="inputRow">
      <input type="text" id="questionInput" placeholder="相手に質問する…" autocomplete="off">
      <button id="askBtn">送信</button>
    </div>

    <!-- グループ判定パネル (判定者のみ) -->
    <div class="judge-box hidden" id="groupJudgeBox">
      <div class="q">それぞれ、人間？ AI？</div>
      <div class="judge-panel" id="judgePanel"></div>
      <div class="judge-buttons" style="margin-top:12px">
        <button id="groupJudgeSubmit" onclick="submitGroupJudgement()" disabled>この内容で判定する</button>
      </div>
    </div>

    <!-- 判定フェーズ (質問者のみ) -->
    <div class="judge-box hidden" id="judgeBox">
      <div class="q">相手は人間？ それともAI？</div>
      <div class="judge-buttons">
        <button onclick="judge('human')">人間だと思う</button>
        <button onclick="judge('ai')">AIだと思う</button>
      </div>
    </div>

    <!-- 結果 -->
    <div class="result hidden" id="result"></div>

    <!-- アンケート(任意) -->
    <div class="survey hidden" id="survey">
      <div class="survey-title">アンケート（任意・研究用）</div>

      <div id="surveyConfidenceBlock">
        <label class="survey-label">判定にどれくらい自信がありましたか？</label>
        <div class="confidence-row" id="confidenceRow">
          <button type="button" data-v="1">1</button>
          <button type="button" data-v="2">2</button>
          <button type="button" data-v="3">3</button>
          <button type="button" data-v="4">4</button>
          <button type="button" data-v="5">5</button>
        </div>
        <div class="confidence-hint">1 = 全く自信なし　5 = 確信していた</div>

        <label class="survey-label">何を見て判断しましたか？</label>
        <div class="basis-row" id="basisRow">
          <button type="button" data-b="言葉遣い">言葉遣い</button>
          <button type="button" data-b="反応速度">反応速度</button>
          <button type="button" data-b="話の内容">話の内容</button>
          <button type="button" data-b="感情表現">感情表現</button>
          <button type="button" data-b="その他">その他</button>
        </div>
      </div>

      <label class="survey-label">自由記述（任意）</label>
      <textarea id="freeText" rows="2" placeholder="気づいたこと、迷った点など"></textarea>

      <div class="survey-actions">
        <button class="skip-btn" onclick="skipSurvey()">スキップ</button>
        <button class="submit-btn" onclick="submitSurvey()">送信</button>
      </div>
    </div>

    <button class="restart hidden" id="restartBtn" onclick="backToSelect()">もう一度遊ぶ</button>
    </div><!-- /gameArea -->
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const chat = document.getElementById('chat');
    const turnInfo = document.getElementById('turnInfo');
    const inputRow = document.getElementById('inputRow');
    const judgeBox = document.getElementById('judgeBox');
    const resultBox = document.getElementById('result');
    const restartBtn = document.getElementById('restartBtn');
    const askBtn = document.getElementById('askBtn');
    const questionInput = document.getElementById('questionInput');
    const waitNote = document.getElementById('waitNote');

    let maxTurns = 5;

    // ===== ゲーム状態 =====
    // mode: 'single' (HTTP・相手はAI) / 'online' (Socket.IO・相手は人間 or AI補填)
    // role: 'asker' (質問者=判定者) / 'answerer' (回答者。オンラインのみ)
    let mode = 'single';
    let role = 'asker';
    let onlineGameId = null;
    let socket = null;

    // ===== プロトタイプ用の直接割当 (決定D9) =====
    // URLに ?force=ai / ?force=human を付けると、本番のαドローを使わず
    // 条件を直接指定できる (実験者用。games.assignment_mode='forced' で記録される)。
    const urlForce = new URLSearchParams(location.search).get('force');

    // ===== タイピング計測 (決定メモ§4) =====
    // compose_time_ms = 「入力欄に触れてから送信するまで」の実時間。
    // IME変換時間も含む実時間を測る(判別手がかりとして効くのは実時間のため)。
    let composeStartAt = null;
    function markComposeStart() {
      if (composeStartAt === null) composeStartAt = Date.now();
    }
    questionInput.addEventListener('focus', markComposeStart);
    questionInput.addEventListener('input', markComposeStart);
    function takeComposeTime() {
      const t = composeStartAt === null ? null : (Date.now() - composeStartAt);
      composeStartAt = null;
      return t;
    }

    function addMsg(text, who, label) {
      const div = document.createElement('div');
      div.className = 'msg ' + who;
      div.innerHTML = '<div class="label">' + label + '</div>' + escapeHtml(text);
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function resetGameUi() {
      chat.innerHTML = '';
      resultBox.className = 'result hidden';
      restartBtn.classList.add('hidden');
      judgeBox.classList.add('hidden');
      inputRow.classList.remove('hidden');
      waitNote.classList.add('hidden');
      document.getElementById('survey').classList.add('hidden');
      document.getElementById('freeText').value = '';
      selConfidence = null;
      selBasis.clear();
      document.querySelectorAll('#confidenceRow button, #basisRow button')
        .forEach(b => b.classList.remove('sel'));
      questionInput.value = '';
      questionInput.disabled = false;
      askBtn.disabled = false;
      composeStartAt = null;
      document.getElementById('roleBanner').classList.add('hidden');
      document.getElementById('groupJudgeBox').classList.add('hidden');
      document.getElementById('judgePanel').innerHTML = '';
    }

    function updateTurnInfo(turn) {
      turnInfo.textContent = (role === 'asker' ? '質問 ' : '回答 ')
        + turn + ' / ' + maxTurns;
    }

    // =====================================================================
    //  シングル (HTTP)
    // =====================================================================
    async function startGame() {
      resetGameUi();
      role = 'asker';
      questionInput.placeholder = '相手に質問する…';
      const body = urlForce === 'ai' ? { force: 'ai' } : {};
      const res = await fetch('/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      maxTurns = data.max_turns;
      updateTurnInfo(0);
      questionInput.focus();
    }

    async function askSingle() {
      const q = questionInput.value.trim();
      if (!q) return;
      const composeMs = takeComposeTime();
      askBtn.disabled = true;
      questionInput.disabled = true;
      addMsg(q, 'you', 'あなた');
      questionInput.value = '';
      waitNote.classList.remove('hidden');
      const tSend = Date.now();

      try {
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: q, compose_time_ms: composeMs })
        });
        const data = await res.json();
        if (data.error) {
          waitNote.classList.add('hidden');
          addMsg('(' + data.error + ')', 'them', 'システム');
        } else {
          // b1: サーバが引いた遅延 delay_ms が「質問送信から」経過するまで表示しない。
          // (通信+生成にかかった時間は remaining から差し引く)
          const remaining = Math.max(0, data.delay_ms - (Date.now() - tSend));
          setTimeout(() => {
            waitNote.classList.add('hidden');
            addMsg(data.reply, 'them', '相手');
            updateTurnInfo(data.turn);
            if (data.can_judge) {
              inputRow.classList.add('hidden');
              judgeBox.classList.remove('hidden');
              return;
            }
            askBtn.disabled = false;
            questionInput.disabled = false;
            questionInput.focus();
          }, remaining);
          return;
        }
      } catch (e) {
        waitNote.classList.add('hidden');
        addMsg('(通信エラー)', 'them', 'システム');
      }
      askBtn.disabled = false;
      questionInput.disabled = false;
      questionInput.focus();
    }

    async function judgeSingle(guess) {
      const res = await fetch('/judge', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ guess: guess })
      });
      const data = await res.json();
      showResult(data, guess);
    }

    // =====================================================================
    //  オンライン (Socket.IO)
    // =====================================================================
    function ensureSocket() {
      if (socket) return socket;
      socket = io();

      socket.on('waiting', d => setPrepText(d.msg));
      socket.on('waiting_status', d => setPrepText(d.msg));

      socket.on('match_found', d => {
        role = d.role;
        maxTurns = d.max_turns;
        onlineGameId = null;
        resetGameUi();
        if (role === 'asker') {
          questionInput.placeholder = '相手に質問する…';
          document.getElementById('headerHint').textContent =
            'あなたは質問者。相手に質問して、人間かAIかを当てよう。';
        } else if (role === 'answerer') {
          questionInput.placeholder = '質問に答える…';
          document.getElementById('headerHint').textContent =
            'あなたは回答者。質問に答えよう。相手はあなたが人間かAIかを当てようとしている。';
          // 回答者は最初の質問が来るまで入力できない
          askBtn.disabled = true;
          questionInput.disabled = true;
        } else {
          // spectator: シャッフルで回答者がAIになった場合のホスト
          document.getElementById('headerHint').textContent =
            '今回はAIが回答します。あなたは観戦モード（会話は見えますが発言できません）。';
          inputRow.classList.add('hidden');
        }
        updateTurnInfo(0);
        showScreen('gameArea');
        if (role === 'asker') questionInput.focus();
      });

      // (観戦者) 会話の中継
      socket.on('spect_message', d => {
        addMsg(d.text, d.kind === 'question' ? 'you' : 'them',
               d.kind === 'question' ? '質問者' : 'AI(あなたの代役)');
      });

      // ---- グループ戦 ----
      socket.on('group_lobby', d => {
        showScreen('prepScreen');
        let t = '合言葉「' + d.key + '」 参加 ' + d.joined + ' / ' + d.needed + ' 人';
        if (d.is_host && d.joined >= 2) t += '　(全員揃わなくても開始できます)';
        setPrepText(t);
        document.getElementById('groupStartBtn').classList.toggle(
          'hidden', !(d.is_host && d.joined >= 2));
      });

      socket.on('group_started', d => {
        maxTurns = d.max_turns;
        onlineGameId = null;
        resetGameUi();
        document.getElementById('groupStartBtn').classList.add('hidden');
        groupLabels = {};
        if (d.role === 'judge') {
          role = 'group_judge';
          groupAliases = d.aliases;
          questionInput.placeholder = '全員への質問を入力…';
          document.getElementById('headerHint').textContent =
            'あなたは判定者。質問して、' + d.aliases.length + '人の中の人間とAIを見分けよう。';
        } else {
          role = 'group_answerer';
          questionInput.placeholder = '質問に答える…';
          document.getElementById('headerHint').textContent =
            'あなたは「' + d.alias + '」として回答します。';
          const banner = document.getElementById('roleBanner');
          let msg = 'あなたは <b>' + d.alias + '</b> です。';
          if (d.act_as_ai) msg += '<br>🤖 <b>ミッション: AIのふりをして答えてください。</b>判定者に「AI」と思わせたら勝ち！';
          else msg += '<br>👤 自然に答えて「人間」と見抜かれたら勝ち。';
          if (d.persona) msg += '<br>🎭 あなたの役: <b>' + d.persona + '</b>（この役になりきって答えて）';
          banner.innerHTML = msg;
          banner.classList.remove('hidden');
          askBtn.disabled = true;
          questionInput.disabled = true;
        }
        updateTurnInfo(0);
        showScreen('gameArea');
        if (d.role === 'judge') questionInput.focus();
      });

      socket.on('group_question', d => {
        addMsg(d.text, 'them', '判定者からの質問 ' + d.turn + '/' + d.max_turns);
        askBtn.disabled = false;
        questionInput.disabled = false;
        composeStartAt = null;
        questionInput.focus();
        turnInfo.textContent = '回答 ' + d.turn + ' / ' + d.max_turns;
      });

      socket.on('group_answer', d => {
        waitNote.classList.add('hidden');
        addMsg(d.text, 'them', d.alias + '（' + d.answered + '/' + d.panel_size + '）');
      });

      socket.on('group_turn_complete', d => {
        turnInfo.textContent = '質問 ' + d.turn + ' / ' + d.max_turns + '　全員の回答が揃いました';
        if (d.can_judge) {
          inputRow.classList.add('hidden');
          buildJudgePanel();
          document.getElementById('groupJudgeBox').classList.remove('hidden');
        } else {
          askBtn.disabled = false;
          questionInput.disabled = false;
          questionInput.focus();
        }
      });

      socket.on('group_result', d => {
        onlineGameId = d.game_id;
        showGroupResult(d);
      });

      // プライベートルーム関連
      socket.on('private_created', d => {
        setPrepText(d.msg + '　合言葉:「' + d.key + '」');
      });
      socket.on('private_error', d => {
        showScreen('privateScreen');
        document.getElementById('privateNote').textContent = d.msg;
      });

      // (回答者) 質問を受信
      socket.on('question', d => {
        addMsg(d.text, 'them', '相手');
        askBtn.disabled = false;
        questionInput.disabled = false;
        composeStartAt = null;  // 計測は質問を見てからの実時間
        questionInput.focus();
      });

      // (質問者) 回答を受信
      socket.on('answer', d => {
        waitNote.classList.add('hidden');
        addMsg(d.text, 'them', '相手');
        updateTurnInfo(d.turn);
        if (d.can_judge) {
          inputRow.classList.add('hidden');
          judgeBox.classList.remove('hidden');
        } else {
          askBtn.disabled = false;
          questionInput.disabled = false;
          questionInput.focus();
        }
      });

      // (回答者) ターン更新
      socket.on('turn_update', d => {
        updateTurnInfo(d.turn);
        // 次の質問が来るまで入力は閉じる
        askBtn.disabled = true;
        questionInput.disabled = true;
      });

      socket.on('result', d => {
        onlineGameId = d.game_id;
        showResult(d, d.your_guess, d.you_are);
      });

      socket.on('opponent_left', () => {
        addMsg('(相手が退出しました)', 'them', 'システム');
        inputRow.classList.add('hidden');
        judgeBox.classList.add('hidden');
        restartBtn.classList.remove('hidden');
      });

      return socket;
    }

    function setPrepText(msg) {
      document.getElementById('prepText').textContent = msg;
    }

    function startQuickMatch() {
      showScreen('prepScreen');
      setPrepText('対戦相手を探しています…');
      const s = ensureSocket();
      const payload = {};
      if (urlForce === 'ai' || urlForce === 'human') payload.force = urlForce;
      s.emit('join_quick', payload);
    }

    function cancelMatching() {
      if (socket) {
        socket.emit('cancel_private', {});
        socket.disconnect();
        socket = null;
      }
      showScreen('modeScreen');
    }

    let groupAliases = [];
    let groupLabels = {};

    function buildJudgePanel() {
      const panel = document.getElementById('judgePanel');
      panel.innerHTML = '';
      groupAliases.forEach(a => {
        const row = document.createElement('div');
        row.className = 'judge-row';
        row.innerHTML = '<span class="alias">' + a + '</span>';
        const bh = document.createElement('button');
        bh.textContent = '人間';
        const ba = document.createElement('button');
        ba.textContent = 'AI';
        bh.onclick = () => { groupLabels[a] = 'human';
          bh.classList.add('sel-h'); ba.classList.remove('sel-a'); checkJudgeReady(); };
        ba.onclick = () => { groupLabels[a] = 'ai';
          ba.classList.add('sel-a'); bh.classList.remove('sel-h'); checkJudgeReady(); };
        row.appendChild(bh); row.appendChild(ba);
        panel.appendChild(row);
      });
    }
    function checkJudgeReady() {
      document.getElementById('groupJudgeSubmit').disabled =
        !groupAliases.every(a => groupLabels[a]);
    }
    function submitGroupJudgement() {
      socket.emit('submit_group_judgement', { labels: groupLabels });
      document.getElementById('groupJudgeBox').classList.add('hidden');
    }

    function showGroupResult(d) {
      inputRow.classList.add('hidden');
      waitNote.classList.add('hidden');
      document.getElementById('roleBanner').classList.add('hidden');
      let html;
      if (d.you_are === 'judge') {
        resultBox.className = 'result ' + (d.score * 2 >= d.total ? 'correct' : 'wrong');
        html = '判定終了！ 正解 <b>' + d.score + ' / ' + d.total + '</b>';
      } else {
        resultBox.className = 'result ' + (d.you_won ? 'correct' : 'wrong');
        const kindLabel = d.your_kind === 'human_as_ai' ? 'AIのふり役' :
                          d.your_kind === 'human' ? '人間' : 'AI';
        html = 'あなた（' + d.alias + '・' + kindLabel + '）は「'
          + (d.judged_as === 'ai' ? 'AI' : d.judged_as === 'human' ? '人間' : '未判定')
          + '」と判定されました<br>' + (d.you_won ? '🎉 あなたの勝ち！' : '😢 見破られ/見過ごされました');
      }
      html += '<div class="reveal-list">' + d.reveal.map(r =>
        r.alias + ': 正体=' + (r.truth === 'ai' ? 'AI' : '人間')
        + (r.was_acting ? '（AIのふり役）' : '')
        + (r.persona ? '／役: ' + r.persona : '')
        + '　→ 判定: ' + (r.judged_as === 'ai' ? 'AI' : r.judged_as === 'human' ? '人間' : '—')
        + (r.correct === true ? ' ✅' : r.correct === false ? ' ❌' : '')
      ).join('<br>') + '</div>';
      resultBox.innerHTML = html;
      resultBox.classList.remove('hidden');
      // グループは判定者の判定理由が多対象になるため、既存アンケートはスキップ
      restartBtn.classList.remove('hidden');
    }

    function sendOnline() {
      const text = questionInput.value.trim();
      if (!text) return;
      const composeMs = takeComposeTime();
      askBtn.disabled = true;
      questionInput.disabled = true;
      addMsg(text, 'you', 'あなた');
      questionInput.value = '';
      if (role === 'asker') {
        waitNote.classList.remove('hidden');
        socket.emit('submit_question', { text: text, compose_time_ms: composeMs });
      } else if (role === 'answerer') {
        socket.emit('submit_answer', { text: text, compose_time_ms: composeMs });
      } else if (role === 'group_judge') {
        waitNote.classList.remove('hidden');
        socket.emit('submit_group_question', { text: text, compose_time_ms: composeMs });
      } else if (role === 'group_answerer') {
        socket.emit('submit_group_answer', { text: text, compose_time_ms: composeMs });
      }
    }

    function judgeOnline(guess) {
      socket.emit('submit_judge', { guess: guess });
      judgeBox.classList.add('hidden');
    }

    // =====================================================================
    //  共通: 送信 / 判定 / 結果 / アンケート
    // =====================================================================
    function send() {
      if (mode === 'online') sendOnline();
      else askSingle();
    }

    function judge(guess) {
      judgeBox.classList.add('hidden');
      if (mode === 'online') judgeOnline(guess);
      else judgeSingle(guess);
    }

    function showResult(data, guess, youAre) {
      const answerLabel = data.answer === 'ai' ? 'AI' : '人間';
      if (youAre === 'spectator') {
        resultBox.className = 'result neutral';
        resultBox.innerHTML = 'ゲーム終了<br>友達の判定: '
          + (data.your_guess === 'ai' ? 'AI' : '人間')
          + '（正体はAI）<br>'
          + (data.correct ? '友達はAIを見破りました' : '友達はAIに騙されました');
        inputRow.classList.add('hidden');
        waitNote.classList.add('hidden');
        restartBtn.classList.remove('hidden');
        return;  // 観戦者はアンケート対象外
      }
      if (youAre === 'answerer') {
        // 回答者側: 自分は判定していないので中立表示
        resultBox.className = 'result neutral';
        resultBox.innerHTML = 'ゲーム終了<br>相手の判定: '
          + (data.your_guess === 'ai' ? 'AI' : '人間')
          + '<br>(あなたは ' + (data.correct ? '見破られました' : '人間かAIか惑わせました') + ')';
        document.getElementById('surveyConfidenceBlock').classList.add('hidden');
      } else {
        const guessLabel = guess === 'ai' ? 'AI' : '人間';
        resultBox.className = 'result ' + (data.correct ? 'correct' : 'wrong');
        resultBox.innerHTML = (data.correct ? '✅ 正解！' : '❌ 不正解…') +
          '<br>あなたの判定: ' + guessLabel +
          '<br>相手の正体: ' + answerLabel;
        document.getElementById('surveyConfidenceBlock').classList.remove('hidden');
      }
      inputRow.classList.add('hidden');
      waitNote.classList.add('hidden');
      document.getElementById('survey').classList.remove('hidden');
    }

    // ===== アンケート =====
    let selConfidence = null;
    const selBasis = new Set();

    document.getElementById('confidenceRow').addEventListener('click', e => {
      if (e.target.tagName !== 'BUTTON') return;
      selConfidence = parseInt(e.target.dataset.v);
      [...e.currentTarget.children].forEach(b => b.classList.remove('sel'));
      e.target.classList.add('sel');
    });

    document.getElementById('basisRow').addEventListener('click', e => {
      if (e.target.tagName !== 'BUTTON') return;
      const b = e.target.dataset.b;
      if (selBasis.has(b)) { selBasis.delete(b); e.target.classList.remove('sel'); }
      else { selBasis.add(b); e.target.classList.add('sel'); }
    });

    async function submitSurvey() {
      const payload = {
        confidence: selConfidence,
        basis: [...selBasis].join(','),
        free_text: document.getElementById('freeText').value.trim(),
      };
      if (mode === 'online') {
        payload.game_id = onlineGameId;
        payload.respondent_id = role === 'asker' ? 'p_asker' : 'p_answerer';
      }
      try {
        await fetch('/survey', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
      } catch (e) { /* 失敗してもゲームは続行 */ }
      finishSurvey();
    }

    function skipSurvey() {
      finishSurvey();
    }

    function finishSurvey() {
      document.getElementById('survey').classList.add('hidden');
      restartBtn.classList.remove('hidden');
    }

    askBtn.addEventListener('click', send);
    let isComposing = false;
    questionInput.addEventListener('compositionstart', () => { isComposing = true; });
    questionInput.addEventListener('compositionend', () => { isComposing = false; });
    questionInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (isComposing || e.isComposing) return;  // 変換確定のEnterは送信しない
        send();
      }
    });

    // ===== 画面遷移 =====
    const config = {
      entry: null,          // 'single' | 'group'
      visibility: null,     // 'public' | 'private'
      roomKey: '',
      maxPlayers: 4,
    };

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    function quitGame() {
      document.body.innerHTML =
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;' +
        'color:var(--muted);font-family:inherit">プレイありがとうございました。タブを閉じて終了できます。</div>';
    }

    function chooseEntry(entry) {
      config.entry = entry;
      if (entry === 'single') showScreen('singleScreen');
      else showScreen('roomCreateScreen');
    }

    // --- シングル ---
    function startSinglePrep() {
      mode = 'single';
      showScreen('prepScreen');
      setPrepText('対戦相手を準備しています…');
      // 表示は経過時間ベースの演出のみ (正体と無関係)
      setTimeout(() => setPrepText('相手が見つかりました'), 900);
      setTimeout(() => {
        showScreen('gameArea');
        startGame();
      }, 1500);
    }

    // --- オンライン ---
    function chooseVisibility(v) {
      config.visibility = v;
      if (v === 'private') {
        showScreen('privateScreen');  // 未実装 (次フェーズ)
      } else {
        mode = 'online';
        startQuickMatch();
      }
    }

    // --- プライベートルーム ---
    let privateMode = 'human';
    const groupCfg = { humans: 2, ai: 1, haa: 0, roleplay: false };
    function choosePrivateMode(m) {
      privateMode = m;
      document.getElementById('pmHuman').classList.toggle('sel', m === 'human');
      document.getElementById('pmShuffle').classList.toggle('sel', m === 'shuffle');
      document.getElementById('pmGroup').classList.toggle('sel', m === 'group');
      document.getElementById('groupConfig').classList.toggle('hidden', m !== 'group');
      document.getElementById('privateNote').textContent =
        m === 'shuffle'
          ? 'シャッフル: ゲストが質問者。回答者はホストかAIかランダムに決まります。'
          : m === 'group'
          ? 'グループ: 判定者1人(ランダム選出)が質問し、全員が匿名で回答。最後に全員を人間/AIに判定します。'
          : '';
    }
    function bindNumRow(id, fn) {
      document.getElementById(id).addEventListener('click', e => {
        if (e.target.tagName !== 'BUTTON') return;
        fn(parseInt(e.target.dataset.n));
        [...e.currentTarget.children].forEach(b => b.classList.remove('sel'));
        e.target.classList.add('sel');
      });
    }
    bindNumRow('gHumansRow', n => groupCfg.humans = n);
    bindNumRow('gAiRow', n => groupCfg.ai = n);
    bindNumRow('gHaaRow', n => groupCfg.haa = n);
    bindNumRow('gRpRow', n => groupCfg.roleplay = n === 1);

    let myGroupKey = null;
    function createPrivate() {
      const key = document.getElementById('roomKeyInput').value.trim();
      if (!key) {
        document.getElementById('privateNote').textContent = '合言葉を入力してください';
        return;
      }
      mode = 'online';
      showScreen('prepScreen');
      const s = ensureSocket();
      if (privateMode === 'group') {
        setPrepText('グループ部屋を作成しています…');
        myGroupKey = key;
        s.emit('create_group', {
          key: key, humans: groupCfg.humans, ai_count: groupCfg.ai,
          human_as_ai: groupCfg.haa, roleplay: groupCfg.roleplay,
        });
      } else {
        setPrepText('部屋を作成しています…');
        s.emit('create_private', { key: key, mode: privateMode });
      }
    }

    function hostStartGroup() {
      if (socket && myGroupKey) socket.emit('start_group', { key: myGroupKey });
    }

    function joinPrivate() {
      const key = document.getElementById('roomKeyInput').value.trim();
      if (!key) {
        document.getElementById('privateNote').textContent = '合言葉を入力してください';
        return;
      }
      mode = 'online';
      showScreen('prepScreen');
      setPrepText('部屋を探しています…');
      const s = ensureSocket();
      s.emit('join_private', { key: key });
    }

    // --- ゲーム後 ---
    function backToSelect() {
      if (socket) { socket.disconnect(); socket = null; }
      document.getElementById('headerHint').textContent =
        '相手はAIのことも、人間のこともあります。';
      showScreen('titleScreen');
    }

    // 起動時はタイトル画面
    showScreen('titleScreen');
  </script>
</body>
</html>
